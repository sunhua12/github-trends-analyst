name: Manual Update GitHub Trends

on:
  workflow_dispatch: # 支援手動點擊按鈕觸發
  schedule:
    - cron: '0 0 * * *' # 每天午午自動執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Action 寫入並 Push 代碼

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx beautifulsoup4 pydantic jinja2 google-genai

    - name: Run Intensive Update
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        chmod +x trigger.sh
        ./trigger.sh

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add combined_trends.json index.html
        git commit -m "Auto-update: Latest GitHub Trends via manual trigger" || echo "No changes to commit"
        git push
